name: Publish on PyPI and TestPyPI

on:
  workflow_dispatch:
    inputs:
      publish_target:
        description: "Choose whether to build only, publish to TestPyPI, or publish to PyPI"
        required: true
        default: dry-run
        type: choice
        options:
          - dry-run
          - testpypi
  push:
    tags:
      - "py-v*"

jobs:
  build:
    name: Build distribution artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Verify release tag matches package version
        if: ${{ github.event_name == 'push' }}
        working-directory: ${{ github.workspace }}/python/ndtbl/
        run: |
          python - <<'PY'
          import os
          import pathlib
          import tomllib

          pyproject = pathlib.Path("pyproject.toml")
          version = tomllib.loads(pyproject.read_text())["project"]["version"]
          ref = os.environ["GITHUB_REF"]
          expected_ref = f"refs/tags/py-v{version}"

          if ref != expected_ref:
              raise SystemExit(
                  "Publishing requires running this workflow from the "
                  f"tag {expected_ref}, but GitHub provided {ref!r}."
              )

          print(f"Publishing from {ref}, matching project version {version}.")
          PY

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57

      - name: Build source and wheel distributions
        working-directory: ${{ github.workspace }}/python/ndtbl/
        run: |
          uv build

      - name: Upload built distributions
        uses: actions/upload-artifact@v7
        with:
          name: python-package-distributions
          path: python/ndtbl/dist/*
          if-no-files-found: error

  publish-testpypi:
    name: Publish to TestPyPI
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_target == 'testpypi' }}
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment:
      name: testpypi

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download built distributions
        uses: actions/download-artifact@v8
        with:
          name: python-package-distributions
          path: dist/

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57

      - name: Show downloaded files
        run: |
          pwd
          ls -lah
          ls -lah dist

      - name: Publish distributions to TestPyPI
        run: |
          uv publish --index testpypi \
          --config-file ${{ github.workspace }}/python/ndtbl/pyproject.toml \
          dist/*

  publish-pypi:
    name: Publish to PyPI
    if: ${{ github.event_name == 'push' }}
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment:
      name: pypi

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download built distributions
        uses: actions/download-artifact@v8
        with:
          name: python-package-distributions
          path: dist/

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57

      - name: Show downloaded files
        run: |
          pwd
          ls -lah
          ls -lah dist

      - name: Publish distributions to PyPI
        run: |
          uv publish dist/*
