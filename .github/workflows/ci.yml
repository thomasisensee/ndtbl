name: CI

on:
  # Run CI on pushes to the main branch
  push:
    branches:
      - main
  # Run CI on all pull requests to the main branch
  pull_request:
    branches:
      - main
  # Run CI upon manual triggers through the 'Actions' tab of the Github UI
  workflow_dispatch:

jobs:
  build-and-test:
    name: Testing on ${{matrix.os}}
    runs-on: ${{matrix.os}}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
    - uses: actions/checkout@v6

    - name: Install Doxygen
      uses: ssciwr/doxygen-install@v2

    - name: Configure cmake
      shell: bash
      run: cmake -B build -DCMAKE_BUILD_TYPE=Debug -Dndtbl_BUILD_TESTING=ON -Dndtbl_BUILD_DOCS=OFF

    - name: Build
      shell: bash
      run: cmake --build build

    - name: Run tests
      shell: bash
      working-directory: ${{ github.workspace }}/build
      run: ctest


  coverage-test:
    name: Coverage Testing
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Install LCov
      run: |
        sudo apt-get install -y lcov

    - name: Install Doxygen
      uses: ssciwr/doxygen-install@v2

    - name: Configure cmake
      shell: bash
      run: cmake -B build DCMAKE_CXX_FLAGS="--coverage" -Dndtbl_BUILD_TESTING=ON -Dndtbl_BUILD_DOCS=OFF

    - name: Build
      shell: bash
      run: cmake --build build

    - name: Run tests
      shell: bash
      working-directory: ${{ github.workspace }}/build
      run: ctest

    - name: Collect coverage report
      shell: bash
      working-directory: ${{ github.workspace }}/build
      run: |
        lcov --directory ./src --capture --output-file coverage.info --ignore-errors mismatch,unused --exclude '*/catch2/*'

    - name: Upload C++ coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        fail_ci_if_error: true
        files: ${{github.workspace}}/coverage.info
